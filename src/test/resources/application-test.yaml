spring:
  datasource:
    url: jdbc:h2:mem:coretest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: false

jwt:
  secret: test-jwt-secret-at-least-32-bytes-long
  allow-local-fallback: false

telegram:
  auth:
    hmac-secret: test-telegram-hmac-secret-32-bytes-long

payments:
  provider: MOCK
